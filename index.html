<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMG_MEME_TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* --- BASIS STIJLEN --- */
        body { margin: 0; background-color: #fff; max-width: 100vw; overflow-x: hidden; transition: background-color 0.6s ease-out, color 0.6s ease-out; font-family: 'Inter', sans-serif; letter-spacing: -0.3px; }
        
        /* Fonts */
        .vhs { font-family: 'VT323', monospace; text-shadow: 0.06rem 0 0.06rem #000, -0.125rem 0 0.06rem #000; animation: textflicker 0.05s infinite alternate; }
        #video-name { font-family: 'VT323', monospace; }
        .infostat > .value { font-family: 'Share Tech Mono', monospace; }

        @keyframes textflicker {
            from { text-shadow: 1px 0.4px 0 #000, -1.5px 0 0 #000; }
            to { text-shadow: 1.05px 0.45px 1px #000, -1.55px -0.25px 1px #000; }
        }

        .first { min-height: 80vh; padding: 80px 0; box-sizing: border-box; gap: 30px; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; z-index: 20; position: relative; }
        .first > * { margin-bottom: 25px; }

        /* --- PLAYER CONTAINER --- */
        #player-container {
            width: min(80vw, calc(80vh * 1.333));
            height: min(80vh, calc(80vw * 0.75));
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* MEDIA ELEMENTS (IMG & VIDEO) */
        #media-content {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            opacity: 0;
            transition: opacity 0.7s;
        }
        #media-content.visible { opacity: 1; }

        /* --- CONTROLS --- */
        #player-controls {
            display: flex;
            margin: 0 auto;
            flex-direction: row-reverse;
            gap: 10px;
            max-width: min(80vw, calc(80vh * 1.333));
            margin-bottom: 80px;
            padding: 20px 0;
            justify-content: space-evenly;
            margin-top: 15px;
            background: linear-gradient(145deg, #000, #222);
            border: 1px solid #444;
            border-radius: 8px;
            box-shadow: inset -2px -2px 4px rgba(255, 255, 255, 0.2), inset 2px 2px 4px rgba(0, 0, 0, 0.6), 2px 2px 5px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: opacity 0.6s ease-out;
        }
        #player-controls.visible { opacity: 1; }

        /* --- REMOTE CONTROL --- */
        #remote {
            position: fixed;
            bottom: -500px; /* Start buiten beeld */
            right: 5%;
            width: 180px; /* Aangepast formaat voor Panasonic remote */
            transform: rotate(-10deg);
            cursor: pointer;
            transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.27); /* Bouncy effect */
            z-index: 1000;
            filter: drop-shadow(5px 10px 15px rgba(0, 0, 0, 0.5));
        }
        
        #remote.visible { 
            bottom: -20px; 
            animation: floatRemote 4s ease-in-out infinite; 
        }
        
        #remote:hover {
            transform: rotate(-5deg) scale(1.05);
        }
        
        /* Als de ervaring gestart is, verplaatsen we de remote iets naar beneden of maken hem kleiner */
        #remote.active-mode {
            bottom: -50px;
            right: 2%;
            width: 150px;
        }

        @keyframes floatRemote {
            0%, 100% { transform: rotate(-10deg) translate(0, 0); }
            50% { transform: rotate(-8deg) translate(0, -10px); }
        }

        /* --- TV EFFECTS --- */
        .screen-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .screen-wrapper { position: relative; width: 100%; height: 100%; cursor: pointer; pointer-events: all; }
        
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: 0 0 200px rgba(0,0,0,0.9) inset; pointer-events: none; }
        .snow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 1; transition: opacity 0.7s; pointer-events: none; z-index: 10; }
        .snow.interlude { opacity: 1 !important; }

        /* --- KNOPPEN --- */
        .tv__switch { height: 40px; width: 40px; position: relative; cursor: pointer; }
        .tv__switch::before { content: ""; display: block; padding-top: 100%; border-radius: 50%; background: linear-gradient(354deg, #000, #222, #888); box-shadow: inset 0 0 4px 1px #9798a3, 0 0 8px 1px rgba(0, 0, 0, 0.42); }
        .tv__switch::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 0; height: 0; border-style: solid; }
        
        .inactive { opacity: 0.3; cursor: not-allowed; }
        
        #playpause::after { width: 12px; height: 14px; border-style: double; border-width: 0 0 0 12px; border-color: #fff; transform: translate(-25%, -50%); opacity: 0.5; }
        #playpause.playing::after { opacity: 1; }
        #back::after { border-width: 7px 12px 7px 0; border-color: transparent #fff transparent transparent; transform: translate(-50%, -50%); opacity: 0.7; }
        #forward::after { border-width: 7px 0 7px 12px; border-color: transparent transparent transparent #fff; transform: translate(-36%, -50%); opacity: 0.7; }

        /* --- INFO DISPLAY --- */
        .infostat { display: flex; flex-direction: column; align-items: flex-end; }
        .infostat > .name { font-size: 0.8rem; font-weight: 600; color: #fff; opacity: 0.85; letter-spacing: 0.4; }
        .infostat > .value { font-size: 1.5rem; text-shadow: 0 0 0px #32cd32, 0 0 11px #32cd32; color: #32cd32; max-width: 150px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        #video-name {
            position: absolute; top: 20px; left: 20px; font-size: 2rem; color: white; z-index: 20; opacity: 0;
            text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
            max-width: 90%;
            line-height: 1.2;
        }
        #video-name.visible { opacity: 1; }

        @media (max-width: 768px) {
            .vhs { font-size: 4rem !important; }
            #remote { width: 120px; right: -20px; }
            #player-controls { flex-direction: column !important; align-items: center !important; gap: 20px; padding: 20px; }
            #video-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="first">
        <h2 style="opacity:0.3; color: #000;">IMGUR TV BACKEND</h2>
        <h1 class="vhs" style="font-size: 7rem; margin:0;">MEME_TV</h1>
        <p style="opacity: 0.7; font-size: 1.2rem; max-width: 600px; padding: 0 20px; text-align: center; line-height: 1.7;">
            Een eindeloze stream van memes.<br>
            Klik op de afstandsbediening om te zappen.
        </p>
    </div>

    <div id="player-container">
        <div id="video-name"></div>
        <div id="media-wrapper" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
        </div>
    </div>

    <div id="player-controls">
        <div id="left" style="display: flex; gap: 10px;">
            <div class="tv__switch" id="back"></div>
            <div class="tv__switch" id="playpause"></div>
            <div class="tv__switch" id="forward"></div>
        </div>
        <div id="right" style="display: flex; gap: 30px;">
            <div class="infostat">
                <div class="name">UPS</div>
                <a class="value" target="_blank" id="view-count">--</a>
            </div>
            <div class="infostat">
                <div class="name">SOURCE</div>
                <a class="value" target="_blank" id="date-count">IMGUR</a>
            </div>
        </div>
    </div>

    <img id="remote" src="remote.png" alt="Panasonic TV Remote">

    <script>
        // --- 1. CONFIGURATIE ---
        const IMGUR_CLIENT_ID = ''; // Optioneel: Vul hier je ID in als je die hebt.

        let memeHistory = [];
        let historyIndex = -1;
        let isStarted = false;

        // --- 2. BACKEND LOGICA (FETCH MEMES) ---
        async function fetchMeme() {
            try {
                let data;
                
                if (IMGUR_CLIENT_ID) {
                    const response = await fetch('https://api.imgur.com/3/gallery/hot/viral/0.json', {
                        headers: { 'Authorization': `Client-ID ${IMGUR_CLIENT_ID}` }
                    });
                    const json = await response.json();
                    const items = json.data.filter(item => !item.nsfw);
                    const randomItem = items[Math.floor(Math.random() * items.length)];
                    
                    let link = randomItem.link;
                    if (randomItem.mp4) link = randomItem.mp4;
                    
                    data = {
                        url: link,
                        title: randomItem.title,
                        ups: randomItem.ups || randomItem.views,
                        isVideo: randomItem.mp4 || link.endsWith('.mp4'),
                        link: `https://imgur.com/gallery/${randomItem.id}`
                    };
                } else {
                    // Public Meme API (Reddit based)
                    const response = await fetch('https://meme-api.com/gimme/wholesomememes'); 
                    const json = await response.json();
                    
                    data = {
                        url: json.url,
                        title: json.title,
                        ups: json.ups,
                        isVideo: json.url.endsWith('.mp4') || json.url.endsWith('.gifv'),
                        link: json.postLink
                    };
                }
                return data;
            } catch (error) {
                console.error("Fout bij ophalen meme:", error);
                return {
                    url: 'https://i.imgur.com/32E4hE9.jpeg',
                    title: 'NO SIGNAL',
                    ups: 0,
                    isVideo: false,
                    link: '#'
                };
            }
        }

        // --- 3. MEDIA PLAYER LOGICA ---
        async function loadMedia(memeData, addToHistory = true) {
            const wrapper = document.getElementById('media-wrapper');
            
            if (addToHistory) {
                memeHistory.push(memeData);
                historyIndex++;
            }

            wrapper.innerHTML = '';
            let element;

            if (memeData.isVideo) {
                element = document.createElement('video');
                element.src = memeData.url;
                element.autoplay = true;
                element.loop = true;
                element.muted = false; 
                element.playsInline = true;
                element.id = 'media-content';
                
                element.addEventListener('loadeddata', () => {
                    element.play().catch(e => {
                         element.muted = true; 
                         element.play();
                    });
                });
            } else {
                element = document.createElement('img');
                element.src = memeData.url;
                element.id = 'media-content';
            }

            wrapper.appendChild(element);

            document.getElementById('view-count').innerText = memeData.ups;
            document.getElementById('video-name').innerText = memeData.title ? memeData.title.toUpperCase() : "UNTITLED";

            setTimeout(() => { 
                document.getElementById('player-controls').classList.add('visible'); 
                element.classList.add('visible');
            }, 500);
            
            const titleEl = document.getElementById('video-name');
            titleEl.classList.add('visible');
            setTimeout(() => titleEl.classList.remove('visible'), 4000);
        }

        async function nextMeme(instant = false) {
            if(!instant) {
                document.querySelector('.snow').classList.add('interlude');
            }

            let data;
            if (historyIndex < memeHistory.length - 1) {
                historyIndex++;
                data = memeHistory[historyIndex];
            } else {
                data = await fetchMeme();
            }

            await loadMedia(data, historyIndex === memeHistory.length - 1 || historyIndex === -1);
            
            if(!instant) {
                setTimeout(() => document.querySelector('.snow').classList.remove('interlude'), 500);
            }
            updateControls();
        }

        function prevMeme() {
            if (historyIndex > 0) {
                historyIndex--;
                loadMedia(memeHistory[historyIndex], false);
                updateControls();
            }
        }

        function togglePlayPause() {
            const video = document.querySelector('video');
            const btn = document.getElementById('playpause');
            if (video) {
                if (video.paused) { video.play(); btn.classList.add('playing'); } 
                else { video.pause(); btn.classList.remove('playing'); }
            }
        }

        function updateControls() {
            const backBtn = document.getElementById('back');
            if (historyIndex <= 0) backBtn.classList.add('inactive');
            else backBtn.classList.remove('inactive');
        }

        // --- 4. START EN INTERACTIE ---
        
        async function startExperience() {
            if(isStarted) {
                // Als we al gestart zijn, werkt de remote als "Volgende" knop
                nextMeme();
                return;
            }

            isStarted = true;
            const remote = document.getElementById('remote');
            const intro = document.querySelector('.first');
            const snow = document.querySelector('.snow');

            // Maak de remote iets subtieler (active mode)
            remote.classList.add('active-mode');

            // Verberg intro
            intro.style.display = 'none';
            document.body.style.backgroundColor = '#000';
            
            // Fade out sneeuw
            snow.style.opacity = '0';

            // Start eerste meme
            await nextMeme(true); 
        }

        // Event Listeners
        document.getElementById('forward').addEventListener('click', () => nextMeme());
        document.getElementById('back').addEventListener('click', prevMeme);
        document.getElementById('playpause').addEventListener('click', togglePlayPause);
        
        // DE REMOTE CLICK HANDLER
        document.getElementById('remote').addEventListener('click', startExperience);

        // TV Effecten
        function createTVEffects() {
            const container = document.createElement('div');
            container.className = 'screen-container';
            const wrapper = document.createElement('div');
            wrapper.className = 'screen-wrapper';
            
            const vignette = document.createElement('div');
            vignette.className = 'vignette';
            const scanlines = document.createElement('div');
            scanlines.className = 'scanlines';
            
            const snow = document.createElement('canvas');
            snow.className = 'snow';

            wrapper.appendChild(scanlines); 
            wrapper.appendChild(vignette);
            wrapper.appendChild(snow);
            container.appendChild(wrapper);
            
            document.getElementById('player-container').appendChild(container);

            // Sneeuw loop
            setInterval(() => {
                const ctx = snow.getContext('2d');
                if (snow.width !== snow.offsetWidth) {
                    snow.width = snow.offsetWidth;
                    snow.height = snow.offsetHeight;
                }
                const w = snow.width;
                const h = snow.height;
                const d = ctx.createImageData(w, h);
                const b = new Uint32Array(d.data.buffer);
                for (let i = 0; i < b.length; i++) {
                    b[i] = Math.random() < 0.5 ? 0xffffffff : 0xff000000;
                }
                ctx.putImageData(d, 0, 0);
            }, 50);
            
            // Click op scherm
            wrapper.addEventListener('click', () => {
                if(!isStarted) startExperience();
                else {
                    const video = document.querySelector('video');
                    if(video) togglePlayPause();
                    else nextMeme();
                }
            });
        }

        // Init effecten
        createTVEffects();

        // Laat remote zien na 1 seconde
        setTimeout(() => {
            document.getElementById('remote').classList.add('visible');
        }, 1000);

    </script>
</body>
</html>
